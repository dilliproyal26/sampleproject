<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My First Page</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      color:white;
      font-family:Arial;
    }

    .box{
      text-align:center;
      padding:40px;
      border-radius:20px;
      background:#1e293b;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      font-size:40px;
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Hello World 🚀</h1>
    <p>My first GitHub page</p>
  </div>

</body>
</html>
